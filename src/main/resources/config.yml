# SnowSim Configuration

world: world
scan-from-y: 700
columns-per-tick: 1000

bounding-box:
  x1: -22
  z1: 301
  x2: 2451
  z2: 3047

# Reference points — one per elevation zone.
# y should be the ground block at that location (snow is measured above it).
reference-points:
  - name: base
    x: 693
    y: 70
    z: -77
  - name: mid
    x: 606
    y: 195
    z: -504
  - name: peak
    x: 568
    y: 316
    z: -1001
  - name: mammoth
    x: 2342
    y: 646
    z: -1930

# Interpolation settings.
# elevation-weight: how much elevation drives the delta vs XZ proximity (0.0 - 1.0).
#   0.7 = 70% elevation, 30% XZ distance. Higher = snow depth tracks altitude more closely.
# idw-power: sharpness of the IDW falloff. Higher = each reference point influences
#   a tighter area around itself. 2.0 is a good default.
interpolation:
  elevation-weight: 0.7
  idw-power: 2.0

# Cosmetic variance — randomises the top partial snow layer for a natural look.
# snow-variance: +/- layer range when adding snow (e.g. 1 = target±1 layer).
# melt-variance: gap width when removing snow, creates patchy differential melt.
cosmetic:
  snow-variance: 1
  melt-variance: 2
