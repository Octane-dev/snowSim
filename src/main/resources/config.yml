# SnowSim Configuration

world: world
scan-from-y: 700
columns-per-tick: 1000

bounding-box:
  x1: -22
  z1: 301
  x2: 2451
  z2: -3047

# Reference points — one per elevation zone.
# y should be the ground block at that location (snow is measured above it).
reference-points:
  - name: base
    x: 693
    y: 70
    z: -77
  - name: mid
    x: 606
    y: 195
    z: -504
  - name: peak
    x: 568
    y: 316
    z: -1001
  - name: mammoth
    x: 2342
    y: 646
    z: -1930

# Extra sample points for /snowreport — useful for known drift/gully zones.
# y should be the ground block Y at that location.
report-points:
  - name: north-gully
    x: 0
    y: 100
    z: 0
  - name: south-bowl
    x: 0
    y: 150
    z: 0

# Interpolation settings for /snowapply.
# elevation-weight: 0.0-1.0, how much elevation drives depth vs XZ proximity.
# idw-power: sharpness of falloff. Higher = tighter influence per reference point.
interpolation:
  elevation-weight: 0.7
  idw-power: 2.0

# Drift settings for /snowdrift.
# scan-distance:       how far upwind to look for shelter, in blocks.
# fan-angle:           degrees either side of wind direction to scan (total arc = 2x this).
# max-drift-cm:        deepest a sheltered deposit can get from drift alone.
# max-scour-cm:        most an exposed column can lose per drift pass.
# scour-threshold-cm:  columns with more snow than this are never scoured (deep base is safe).
drift:
  columns-per-tick: 300
  scan-distance: 80
  # fan-angle: widened to 40 to better capture E-W ridges with diagonal winds
  fan-angle: 40
  max-drift-cm: 600.0
  max-scour-cm: 25.0
  scour-threshold-cm: 100.0
  # shelter-normaliser: the shelter score value that maps to 100% drift effect.
  # Lower = more sensitive to smaller ridges. Calibrated to your terrain (ridges ~15-25 blocks).
  # Increase if drift is too aggressive on small features, decrease if large ridges underperform.
  shelter-normaliser: 8.0
  # fence-drift-reach: how many blocks downwind of a fence the drift deposit extends
  fence-drift-reach: 18
  # fence-drift-peak-cm: max drift depth right next to the fence (tapers to 0 at reach distance)
  fence-drift-peak-cm: 150.0
  # drift-slope-angle: angle of the leeward drift face in degrees (30-40 is realistic).
  # Lower = gentler slope = drift extends further horizontally.
  # Higher = steeper wall = drift stays closer to the ridge.
  drift-slope-angle: 35.0
  # smoothing-repose-layers: minimum layer difference (1 layer = 12.5cm) between a column
  #   and its 5x5 neighbours before smoothing fill kicks in.
  #   Lower = more aggressive fill into gullies. 5 = ~62.5cm threshold.
  smoothing-repose-layers: 5
  # smoothing-fill-fraction: how much of the excess gap to fill per drift pass (0.0-1.0).
  #   Higher = faster fill, more aggressive smoothing. 0.7 = fill 70% of excess per pass.
  smoothing-fill-fraction: 0.7
  # smoothing-iterations: how many smoothing sweeps to run after each drift pass.
  # Each iteration propagates fills ~5 blocks further into gullies.
  # 3 = ~15 blocks propagation, 5 = ~25 blocks. Higher = longer runtime.
  smoothing-iterations: 3

# Cosmetic variance — randomises the top partial snow layer for a natural look.
# snow-variance: +/- layer range when adding snow.
# melt-variance: gap width when removing snow, creates patchy differential melt.
cosmetic:
  snow-variance: 1
  melt-variance: 2
