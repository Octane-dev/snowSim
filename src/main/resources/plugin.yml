name: SnowSim
version: 1.4.0
main: com.skiresort.snowsim.SnowSim
api-version: 1.20
description: Snow depth simulation for ski resorts
authors: [SkiResort]

commands:
  updatesnow:
    description: Set absolute snow depth (cm) across the resort
    usage: /updatesnow <depth_cm>
    permission: snowsim.update
  snowsample:
    description: Measure current snow at reference points and calculate deltas
    usage: /snowsample <base_cm> <mid_cm> <peak_cm> <mammoth_cm>
    permission: snowsim.update
  snowapply:
    description: Apply cached deltas from /snowsample across the resort
    usage: /snowapply
    permission: snowsim.update
  snowreport:
    description: Print current snow depth at all reference and sample points
    usage: /snowreport
    permission: snowsim.update
  snowreload:
    description: Reload SnowSim config without restarting the server
    usage: /snowreload
    permission: snowsim.update
  snowdrift:
    description: Apply wind drift pass across the resort
    usage: /snowdrift <wind_direction> [wind_strength]
    permission: snowsim.update
  snowmelt:
    description: Apply elevation-aware melt across the resort
    usage: /snowmelt <base_cm> <mid_cm> <peak_cm> <mammoth_cm>
    permission: snowsim.update
  snowundo:
    description: Undo the last snow operation (up to 3 levels)
    usage: /snowundo
    permission: snowsim.update

permissions:
  snowsim.update:
    description: Allows use of all SnowSim commands
    default: op
